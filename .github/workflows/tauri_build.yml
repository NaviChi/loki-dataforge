name: Cross-Platform Tauri Build Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    timeout-minutes: 90
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: 'apps/desktop/package-lock.json'
        
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: >-
          ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
          
    - name: Install Ubuntu Dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
        
    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: 'apps/desktop/src-tauri -> target'
        
    - name: Install NPM dependencies
      working-directory: apps/desktop
      run: npm ci
      
    - name: Build React App
      working-directory: apps/desktop
      run: npm run build
      
    - name: Validate Tauri 1.0 RC Native Bundles
      working-directory: apps/desktop
      run: npm run tauri build
      
    - name: Upload Native Release Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: loki-data-forge-1.0-RC-${{ matrix.os }}
        path: |
          apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
          apps/desktop/src-tauri/target/release/bundle/msi/*.msi
          apps/desktop/src-tauri/target/release/bundle/deb/*.deb
          apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
        if-no-files-found: ignore
        
    - name: Run Native Workspace Tests
      # If this passes here, it confirms we bypass Homebrew signature blocks present on the dev machine
      run: cargo test --workspace --release
